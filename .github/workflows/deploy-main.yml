# Production: runs only when code lands on `main` (includes merges from PRs).
# Does NOT run on pull_request events — open PRs against main are not built here.
#
# Secrets:
#   VPS_HOST, VPS_USER, VPS_SSH_KEY, VPS_APP_PATH, GHCR_USER, GHCR_READ_TOKEN
# GHCR_READ_TOKEN = GitHub PAT (classic) with read:packages (authorize SSO for org if applicable).
# VPS needs: deploy folder with .env (DATABASE_URL, AUTH_SECRET, …). No git fetch on server.
#
# Repo → Settings → Actions → Workflow permissions → Read and write (for GHCR push).

name: Deploy production (main)

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          DATABASE_URL: postgresql://build:build@build:5432/build?schema=public
          AUTH_SECRET: build-time-placeholder-secret-not-used-at-runtime
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container (verify Dockerfile)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: portal:ci-main
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push:
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      docker_image: ${{ steps.meta.outputs.docker_image }}
      apply_docker_image: ${{ steps.meta.outputs.apply_docker_image }}
    steps:
      - uses: actions/checkout@v4

      - name: Image ref (GHCR lowercase)
        id: meta
        run: |
          lower=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "docker_image=ghcr.io/${lower}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "docker_image_latest=ghcr.io/${lower}:latest" >> "$GITHUB_OUTPUT"
          echo "apply_docker_image=ghcr.io/${lower}:apply-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "apply_docker_image_latest=ghcr.io/${lower}:apply-latest" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push HR app
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.docker_image }}
            ${{ steps.meta.outputs.docker_image_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push candidate apply portal
        uses: docker/build-push-action@v6
        with:
          context: ./HUPTLE_userpfp
          file: ./HUPTLE_userpfp/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.apply_docker_image }}
            ${{ steps.meta.outputs.apply_docker_image_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: docker-compose.yml
          target: ${{ secrets.VPS_APP_PATH }}

      - name: Deploy production over SSH
        uses: appleboy/ssh-action@v1.2.5
        env:
          VPS_APP_PATH: ${{ secrets.VPS_APP_PATH }}
          DOCKER_IMAGE: ${{ needs.build-and-push.outputs.docker_image }}
          APPLY_DOCKER_IMAGE: ${{ needs.build-and-push.outputs.apply_docker_image }}
          GHCR_USER: ${{ secrets.GHCR_USER }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: VPS_APP_PATH,DOCKER_IMAGE,APPLY_DOCKER_IMAGE,GHCR_USER,GHCR_READ_TOKEN
          script: |
            set -e
            if [ -z "$VPS_APP_PATH" ]; then
              echo "FATAL: VPS_APP_PATH secret is not set." >&2
              exit 1
            fi
            if [ -z "$GHCR_READ_TOKEN" ]; then
              echo "FATAL: GHCR_READ_TOKEN secret is not set." >&2
              exit 1
            fi
            mkdir -p "$VPS_APP_PATH"
            cd "$VPS_APP_PATH"
            [ -f .env ] || touch .env
            if grep -q '^DOCKER_IMAGE=' .env; then
              sed -i "s|^DOCKER_IMAGE=.*|DOCKER_IMAGE=${DOCKER_IMAGE}|" .env
            else
              echo "DOCKER_IMAGE=${DOCKER_IMAGE}" >> .env
            fi
            if grep -q '^APPLY_DOCKER_IMAGE=' .env; then
              sed -i "s|^APPLY_DOCKER_IMAGE=.*|APPLY_DOCKER_IMAGE=${APPLY_DOCKER_IMAGE}|" .env
            else
              echo "APPLY_DOCKER_IMAGE=${APPLY_DOCKER_IMAGE}" >> .env
            fi
            export DOCKER_IMAGE
            export APPLY_DOCKER_IMAGE

            login_ok=0
            for i in 1 2 3; do
              if printf '%s' "$GHCR_READ_TOKEN" | timeout 30 docker login ghcr.io -u "$GHCR_USER" --password-stdin; then
                login_ok=1
                break
              fi
              echo "docker login attempt $i failed, retrying in 5s..." >&2
              sleep 5
            done
            if [ "$login_ok" -ne 1 ]; then
              echo "FATAL: docker login ghcr.io failed after 3 attempts." >&2
              exit 1
            fi

            pull_ok=0
            for i in 1 2 3; do
              if timeout 300 docker compose pull; then
                pull_ok=1
                break
              fi
              echo "docker compose pull attempt $i failed, retrying in 10s..." >&2
              sleep 10
            done
            if [ "$pull_ok" -ne 1 ]; then
              echo "FATAL: docker compose pull failed after 3 attempts." >&2
              exit 1
            fi

            docker compose up -d --no-build
            docker image prune -f >/dev/null 2>&1 || true
