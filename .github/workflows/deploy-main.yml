# Production: runs only when code lands on `main` (includes merges from PRs).
# Does NOT run on pull_request events — open PRs against main are not built here.
#
# Secrets (same as before):
#   VPS_HOST, VPS_USER, VPS_SSH_KEY, VPS_APP_PATH, GHCR_USER, GHCR_READ_TOKEN
#
# Repo → Settings → Actions → Workflow permissions → Read and write (for GHCR push).

name: Deploy production (main)

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          DATABASE_URL: postgresql://build:build@build:5432/build?schema=public
          AUTH_SECRET: build-time-placeholder-secret-not-used-at-runtime
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container (verify Dockerfile)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: portal:ci-main
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push:
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      docker_image: ${{ steps.meta.outputs.docker_image }}
    steps:
      - uses: actions/checkout@v4

      - name: Image ref (GHCR lowercase)
        id: meta
        run: |
          lower=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "docker_image=ghcr.io/${lower}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "docker_image_latest=ghcr.io/${lower}:latest" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.docker_image }}
            ${{ steps.meta.outputs.docker_image_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy production over SSH
        uses: appleboy/ssh-action@v1.2.5
        env:
          VPS_APP_PATH: ${{ secrets.VPS_APP_PATH }}
          DEPLOY_BRANCH: main
          DOCKER_IMAGE: ${{ needs.build-and-push.outputs.docker_image }}
          GHCR_USER: ${{ secrets.GHCR_USER }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          GIT_DEPLOY_TOKEN: ${{ secrets.GIT_DEPLOY_TOKEN }}
          
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: VPS_APP_PATH,DEPLOY_BRANCH,DOCKER_IMAGE,GHCR_USER,GHCR_READ_TOKEN,GITHUB_REPO,GIT_DEPLOY_TOKEN
          script: |
            set -e
            cd "$VPS_APP_PATH"
            git remote set-url origin "https://x-access-token:${GIT_DEPLOY_TOKEN}@github.com/${GITHUB_REPO}.git"
            git fetch origin
            git checkout "$DEPLOY_BRANCH"
            git reset --hard "origin/$DEPLOY_BRANCH"
            [ -f .env ] || touch .env

            login_ok=0
            for i in 1 2 3; do
              if printf '%s' "$GHCR_READ_TOKEN" | timeout 30 docker login ghcr.io -u "$GHCR_USER" --password-stdin; then
                login_ok=1
                break
              fi
              echo "docker login attempt $i failed, retrying in 5s..." >&2
              sleep 5
            done
            if [ "$login_ok" -ne 1 ]; then
              echo "FATAL: docker login ghcr.io failed after 3 attempts." >&2
              exit 1
            fi

            export DOCKER_IMAGE

            pull_ok=0
            for i in 1 2 3; do
              if timeout 300 docker compose pull; then
                pull_ok=1
                break
              fi
              echo "docker compose pull attempt $i failed, retrying in 10s..." >&2
              sleep 10
            done
            if [ "$pull_ok" -ne 1 ]; then
              echo "FATAL: docker compose pull failed after 3 attempts." >&2
              exit 1
            fi

            docker compose up -d --no-build
            docker image prune -f >/dev/null 2>&1 || true
