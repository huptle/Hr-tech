# Dev branch:
#   • pull_request → lint + Next build + Docker build (verify only), no deploy
#   • push to dev   → same CI + push image :dev-<sha> + :dev + SSH deploy to VPS_APP_PATH_DEV (e.g. port 3001)
#
# One-time on VPS: second clone + .env with APP_PORT=3001 and its own Postgres DB name.
#   VPS_APP_PATH_DEV — e.g. /opt/portal/Hr-tech-dev
#
# Other secrets same as production (VPS_HOST, VPS_USER, VPS_SSH_KEY, GHCR_*).
# Deploy copies docker-compose.yml via SCP (no git on VPS). GHCR_READ_TOKEN needs read:packages.
# For private repos: Settings → Actions → General → Workflow permissions → Read and write.

name: CI / Deploy dev

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

concurrency:
  group: ci-dev-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          DATABASE_URL: postgresql://build:build@build:5432/build?schema=public
          AUTH_SECRET: build-time-placeholder-secret-not-used-at-runtime
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container (verify Dockerfile)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: portal:ci-dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    outputs:
      docker_image: ${{ steps.meta.outputs.docker_image }}
      apply_docker_image: ${{ steps.meta.outputs.apply_docker_image }}
    steps:
      - uses: actions/checkout@v4

      - name: Image ref (dev tags)
        id: meta
        run: |
          lower=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "docker_image=ghcr.io/${lower}:dev-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "docker_image_dev=ghcr.io/${lower}:dev" >> "$GITHUB_OUTPUT"
          echo "apply_docker_image=ghcr.io/${lower}:apply-dev-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "apply_docker_image_dev=ghcr.io/${lower}:apply-dev" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push HR app (dev)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.docker_image }}
            ${{ steps.meta.outputs.docker_image_dev }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push candidate apply portal (dev)
        uses: docker/build-push-action@v6
        with:
          context: ./HUPTLE_userpfp
          file: ./HUPTLE_userpfp/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.apply_docker_image }}
            ${{ steps.meta.outputs.apply_docker_image_dev }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dev:
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose.yml to VPS (dev)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: docker-compose.yml
          target: ${{ secrets.VPS_APP_PATH_DEV }}

      - name: Deploy dev stack over SSH
        uses: appleboy/ssh-action@v1.2.5
        env:
          VPS_APP_PATH: ${{ secrets.VPS_APP_PATH_DEV }}
          DOCKER_IMAGE: ${{ needs.build-and-push.outputs.docker_image }}
          APPLY_DOCKER_IMAGE: ${{ needs.build-and-push.outputs.apply_docker_image }}
          GHCR_USER: ${{ secrets.GHCR_USER }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: VPS_APP_PATH,DOCKER_IMAGE,APPLY_DOCKER_IMAGE,GHCR_USER,GHCR_READ_TOKEN
          script: |
            set -e
            if [ -z "$VPS_APP_PATH" ]; then
              echo "FATAL: VPS_APP_PATH_DEV secret is not set in GitHub Actions." >&2
              exit 1
            fi
            if [ -z "$GHCR_READ_TOKEN" ]; then
              echo "FATAL: GHCR_READ_TOKEN secret is not set." >&2
              exit 1
            fi
            mkdir -p "$VPS_APP_PATH"
            cd "$VPS_APP_PATH"
            [ -f .env ] || touch .env
            if grep -q '^DOCKER_IMAGE=' .env; then
              sed -i "s|^DOCKER_IMAGE=.*|DOCKER_IMAGE=${DOCKER_IMAGE}|" .env
            else
              echo "DOCKER_IMAGE=${DOCKER_IMAGE}" >> .env
            fi
            if grep -q '^APPLY_DOCKER_IMAGE=' .env; then
              sed -i "s|^APPLY_DOCKER_IMAGE=.*|APPLY_DOCKER_IMAGE=${APPLY_DOCKER_IMAGE}|" .env
            else
              echo "APPLY_DOCKER_IMAGE=${APPLY_DOCKER_IMAGE}" >> .env
            fi
            export DOCKER_IMAGE
            export APPLY_DOCKER_IMAGE

            login_ok=0
            for i in 1 2 3; do
              if printf '%s' "$GHCR_READ_TOKEN" | timeout 30 docker login ghcr.io -u "$GHCR_USER" --password-stdin; then
                login_ok=1
                break
              fi
              echo "docker login attempt $i failed, retrying in 5s..." >&2
              sleep 5
            done
            if [ "$login_ok" -ne 1 ]; then
              echo "FATAL: docker login ghcr.io failed." >&2
              exit 1
            fi

            pull_ok=0
            for i in 1 2 3; do
              if timeout 300 docker compose pull; then
                pull_ok=1
                break
              fi
              echo "docker compose pull attempt $i failed, retrying in 10s..." >&2
              sleep 10
            done
            if [ "$pull_ok" -ne 1 ]; then
              echo "FATAL: docker compose pull failed." >&2
              exit 1
            fi

            docker compose up -d --no-build
            docker image prune -f >/dev/null 2>&1 || true
